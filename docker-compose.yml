name: meme_battle_backend

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/terrasoftwareteam/meme_battle_backend/app:${APP_IMAGE_TAG:-latest}
    container_name: meme_battle_backend-app
    restart: unless-stopped
    environment:
      RUST_LOG: ${RUST_LOG:-info,sqlx=info,tower_http=info,axum::rejection=trace,hyper=info,h2=info,reqwest=info,rustls=info}
      POSTGRES_USER: ${POSTGRES_USER:-testuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: ${POSTGRES_DB:-testdb}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-5}
      DATABASE_MIN_CONNECTIONS: ${DATABASE_MIN_CONNECTIONS:-1}
      SERVICE_HOST: 0.0.0.0
      SERVICE_PORT: 8080
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otelcol:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-local-env-jwt-secret-32-bytes}
      ARGON2_SECRET_KEY: ${ARGON2_SECRET_KEY:-change-me-in-local-env-argon2-secret-32}
      HMAC_SECRET_KEY: ${HMAC_SECRET_KEY:-change-me-in-local-env-hmac-secret-32}
      SECRET_SEED_KEY: ${SECRET_SEED_KEY}
      HACKCLUB_CDN_API_KEY: ${HACKCLUB_CDN_API_KEY}
      HACKCLUB_CDN_BASE_URL: ${HACKCLUB_CDN_BASE_URL:-https://cdn.hackclub.com}
      CENTRIFUGO_API_URL: ${CENTRIFUGO_API_URL:-http://centrifugo:8000/api}
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY:-CHANGE_ME_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      otelcol:
        condition: service_started
    ports:
      - "${APP_EXTERNAL_PORT:-8081}:8080"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:15-alpine
    container_name: meme_battle_backend-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-testuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: ${POSTGRES_DB:-testdb}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  centrifugo:
    image: centrifugo/centrifugo:v5.2
    container_name: centrifugo
    restart: unless-stopped
    environment:
      CENTRIFUGO_TOKEN_HMAC_SECRET_KEY: ${CENTRIFUGO_TOKEN_HMAC_SECRET_KEY:-dummyjwtsecretkeydummyjwtsecretkeydummyjwtsecretkey}
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY:-CHANGE_ME_API_KEY}
      CENTRIFUGO_ADMIN_PASSWORD: ${CENTRIFUGO_ADMIN_PASSWORD:-CHANGE_ME_ADMIN_PASSWORD}
      CENTRIFUGO_ADMIN_SECRET: ${CENTRIFUGO_ADMIN_SECRET:-CHANGE_ME_ADMIN_SECRET}
    volumes:
      - ./centrifuge/config.json:/centrifugo/config.json
    ports:
      - "8000:8000"
    command: centrifugo -c config.json
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  # ─── Observability Stack ──────────────────────────────────────────────────────

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.155.0
    container_name: meme_battle_backend-otelcol
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./observability/otelcol-config.yml:/etc/otelcol/config.yml:ro
    networks:
      - internal
    depends_on:
      - tempo
      - loki

  tempo:
    image: grafana/tempo:3.0.2
    container_name: meme_battle_backend-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - ./observability/tempo-config.yml:/etc/tempo/config.yml:ro
      - tempo_data:/var/tempo
    networks:
      - internal

  loki:
    image: grafana/loki:3.7.3
    container_name: meme_battle_backend-loki
    restart: unless-stopped
    user: "0"
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./observability/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/var/loki
    networks:
      - internal

  grafana:
    image: grafana/grafana:13.1.0
    container_name: meme_battle_backend-grafana
    restart: unless-stopped
    environment:
      # Admin credentials — override via .env in production
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-change_me_grafana_password}
      # Force dark theme for all users
      GF_USERS_DEFAULT_THEME: dark
      # Anonymous access configuration
      GF_AUTH_ANONYMOUS_ENABLED: ${GF_AUTH_ANONYMOUS_ENABLED:-false}
      GF_AUTH_ANONYMOUS_ORG_ROLE: ${GF_AUTH_ANONYMOUS_ORG_ROLE:-Viewer}
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      # Embed and public dashboards configuration
      GF_SECURITY_ALLOW_EMBEDDING: ${GF_SECURITY_ALLOW_EMBEDDING:-true}
      GF_PUBLIC_DASHBOARDS_ENABLED: ${GF_PUBLIC_DASHBOARDS_ENABLED:-true}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/"
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor,traceToMetrics,metricsSummary,publicDashboards"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "${GRAFANA_EXTERNAL_PORT:-3000}:3000"
    networks:
      - internal
    depends_on:
      - tempo
      - loki

volumes:
  postgres_data:
  tempo_data:
  loki_data:
  grafana_data:

networks:
  internal:
    driver: bridge
