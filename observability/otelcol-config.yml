# OpenTelemetry Collector configuration
# Receives OTLP from the app, exports traces to Tempo and logs to Loki.

receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"
      grpc:
        endpoint: "0.0.0.0:4317"

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25

exporters:
  # Traces → Tempo (via OTLP gRPC)
  otlp_grpc/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true

  # Logs → Loki (via OTLP HTTP — native loki exporter removed in otelcol v0.55+)
  otlp_http/loki:
    endpoint: "http://loki:3100/otlp"
    tls:
      insecure: true

  # Debug exporter — prints summary to collector logs
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp_grpc/tempo, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp_http/loki, debug]
